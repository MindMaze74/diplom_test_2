---
- name: Setup Elasticsearch
  hosts: elasticsearch
  become: yes
  gather_facts: yes

  tasks:
    - name: Remove old elasticsearch container if exists
      docker_container:
        name: elasticsearch
        state: absent

    - name: Remove old elasticsearch data directory if exists (optional, для чистоты)
      file:
        path: /opt/elasticsearch
        state: absent

    - name: Create Docker volume for Elasticsearch data
      docker_volume:
        name: elasticsearch-data
        state: present

    - name: Increase vm.max_map_count
      sysctl:
        name: vm.max_map_count
        value: '262144'
        state: present
        reload: yes

    - name: Run elasticsearch container with volume
      docker_container:
        name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
        state: started
        restart_policy: always
        ports:
          - "9200:9200"
          - "9300:9300"
        env:
          discovery.type: "single-node"
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        volumes:
          - elasticsearch-data:/usr/share/elasticsearch/data

    - name: Wait for Elasticsearch to be ready
      uri:
        url: "http://localhost:9200"
        status_code: 200
        timeout: 10
      register: result
      until: result.status == 200
      retries: 30
      delay: 5
      ignore_errors: yes

    - name: Show Elasticsearch status
      debug:
        msg: "Elasticsearch on {{ inventory_hostname }} is {{ 'ready' if result.status == 200 else 'not ready' }}"