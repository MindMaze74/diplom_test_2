---
- name: Setup Prometheus
  hosts: prometheus
  become: yes
  tags: prometheus

  tasks:
    - name: Ensure prometheus config directory exists
      file:
        path: /opt/prometheus
        state: directory
        mode: 0755

    - name: Deploy prometheus.yml with exporters targets
      copy:
        dest: /opt/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s

          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

            - job_name: 'node'
              static_configs:
                - targets:
                    - '{{ hostvars["web1"]["ansible_default_ipv4"]["address"] }}:9100'
                    - '{{ hostvars["web2"]["ansible_default_ipv4"]["address"] }}:9100'

            - job_name: 'nginxlog'
              static_configs:
                - targets:
                    - '{{ hostvars["web1"]["ansible_default_ipv4"]["address"] }}:4040'
                    - '{{ hostvars["web2"]["ansible_default_ipv4"]["address"] }}:4040'
      notify: restart prometheus container

    - name: Remove old prometheus container if exists
      docker_container:
        name: prometheus
        state: absent
      when: True

    - name: Run prometheus container with config
      docker_container:
        name: prometheus
        image: prom/prometheus:latest
        state: started
        restart_policy: always
        ports:
          - "9090:9090"
        volumes:
          - /opt/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  handlers:
    - name: restart prometheus container
      docker_container:
        name: prometheus
        image: prom/prometheus:latest
        state: started
        restart_policy: always
        ports:
          - "9090:9090"
        volumes:
          - /opt/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        force: yes   