---
- name: Setup Prometheus
  hosts: prometheus
  become: yes
  tasks:
    - name: Ensure prometheus config directory exists
      file:
        path: /etc/prometheus
        state: directory
        mode: 0755

    - name: Deploy prometheus.yml with exporters targets
      copy:
        dest: /etc/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s

          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

            - job_name: 'node_exporter'
              static_configs:
                - targets:
                    - '{{ hostvars["web1"]["ansible_default_ipv4"]["address"] }}:9100'
                    - '{{ hostvars["web2"]["ansible_default_ipv4"]["address"] }}:9100'

            - job_name: 'nginx_exporter'
              static_configs:
                - targets:
                    - '{{ hostvars["web1"]["ansible_default_ipv4"]["address"] }}:9113'
                    - '{{ hostvars["web2"]["ansible_default_ipv4"]["address"] }}:9113'

            - job_name: 'nginxlog'
              static_configs:
                - targets:
                    - '{{ hostvars["web1"]["ansible_default_ipv4"]["address"] }}:4040'
                    - '{{ hostvars["web2"]["ansible_default_ipv4"]["address"] }}:4040'
      notify: reload prometheus

    - name: Make sure Prometheus is running
      systemd:
        name: prometheus
        state: started
        enabled: yes

  handlers:
    - name: reload prometheus
      systemd:
        name: prometheus
        state: reloaded