---
- name: Setup web servers
  hosts: web
  become: yes
  tasks:
    # ----- Подготовка каталогов для Nginx (Docker) -----
    - name: Ensure nginx directories exist
      file:
        path: "/opt/nginx/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - html
        - logs
        - conf.d

    # ----- Настройка страницы статуса Nginx (/nginx_status) -----
    - name: Deploy nginx status configuration
      copy:
        dest: /opt/nginx/conf.d/status.conf
        content: |
          location /nginx_status {
              stub_status on;
              allow 127.0.0.1;
              allow ::1;
              deny all;
          }
      notify: restart nginx_container

    # ----- Node Exporter -----
    - name: Download Node Exporter
      get_url:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz
        dest: /tmp/node_exporter.tar.gz
        timeout: 30
      register: download_node
      until: download_node is success
      retries: 3
      delay: 10

    - name: Extract Node Exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp
        remote_src: yes
        creates: /tmp/node_exporter-1.8.2.linux-amd64/node_exporter
      when: download_node is success

    - name: Install Node Exporter binary
      copy:
        src: /tmp/node_exporter-1.8.2.linux-amd64/node_exporter
        dest: /usr/local/bin/node_exporter
        mode: 0755
        remote_src: yes
      when: download_node is success

    - name: Create node_exporter user
      user:
        name: node_exporter
        system: yes
        shell: /bin/false
        create_home: no

    - name: Create Node Exporter systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter

          [Install]
          WantedBy=multi-user.target
      notify: restart node_exporter

    - name: Start and enable Node Exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes
        daemon_reload: yes

    # ----- prometheus-nginxlog-exporter -----
    - name: Download prometheus-nginxlog-exporter DEB package
      get_url:
        url: https://github.com/martin-helmich/prometheus-nginxlog-exporter/releases/download/v1.9.2/prometheus-nginxlog-exporter_1.9.2_linux_amd64.deb
        dest: /tmp/nginxlog-exporter.deb
        timeout: 30
      register: download_nginxlog
      until: download_nginxlog is success
      retries: 3
      delay: 10

    - name: Install prometheus-nginxlog-exporter
      apt:
        deb: /tmp/nginxlog-exporter.deb
      when: download_nginxlog is success

    - name: Create prometheus-nginxlog-exporter configuration
      copy:
        dest: /etc/prometheus-nginxlog-exporter.hcl
        content: |
          listen {
              port = 4040
              address = "0.0.0.0"
          }

          namespace "nginx" {
              format = "$remote_addr - $remote_user [$time_local] \"$request\" $status $body_bytes_sent \"$http_referer\" \"$http_user_agent\""
              source_files = ["/opt/nginx/logs/access.log"]
          }
      notify: restart nginxlog_exporter

    - name: Start and enable prometheus-nginxlog-exporter
      systemd:
        name: prometheus-nginxlog-exporter
        state: started
        enabled: yes
        daemon_reload: yes

    # ----- Filebeat (Docker-контейнер) -----
    - name: Create filebeat config directory
      file:
        path: /opt/filebeat
        state: directory
        mode: '0755'

    - name: Deploy Filebeat configuration
      copy:
        dest: /opt/filebeat/filebeat.yml
        content: |
          filebeat.inputs:
          - type: log
            enabled: true
            paths:
              - /var/log/nginx/access.log
            fields:
              log_type: nginx_access

          - type: log
            enabled: true
            paths:
              - /var/log/nginx/error.log
            fields:
              log_type: nginx_error

          processors:
            - add_fields:
                target: host
                fields:
                  name: "{{ ansible_hostname }}"

          output.elasticsearch:
            hosts: ["{{ elasticsearch_private_ip }}:9200"]
            indices:
              - index: "nginx-logs-%{+yyyy.MM.dd}"
                when.contains:
                  fields.log_type: "nginx_access"
              - index: "nginx-error-logs-%{+yyyy.MM.dd}"
                when.contains:
                  fields.log_type: "nginx_error"

          setup.template.name: "nginx-logs"
          setup.template.pattern: "nginx-logs-*"
          setup.template.overwrite: true
          setup.ilm.enabled: false
      notify: restart filebeat_container

    # ----- Очистка старых индексов и шаблона Elasticsearch -----
    - name: Delete nginx index template
      uri:
        url: "http://{{ elasticsearch_private_ip }}:9200/_index_template/nginx-logs"
        method: DELETE
        status_code: 200,404
      ignore_errors: yes
      run_once: yes
      delegate_to: localhost

    - name: Get list of nginx indices
      uri:
        url: "http://{{ elasticsearch_private_ip }}:9200/_cat/indices/nginx-*?h=index"
        return_content: yes
      register: indices_list
      ignore_errors: yes
      run_once: yes
      delegate_to: localhost

    - name: Delete each nginx index
      uri:
        url: "http://{{ elasticsearch_private_ip }}:9200/{{ item }}"
        method: DELETE
        status_code: 200,404
      loop: "{{ indices_list.content.split('\n') }}"
      when: indices_list.content | length > 0
      ignore_errors: yes
      run_once: yes
      delegate_to: localhost

    - name: Run filebeat container
      docker_container:
        name: filebeat
        image: docker.elastic.co/beats/filebeat:7.17.25
        state: started
        restart_policy: always
        recreate: yes
        volumes:
          - /opt/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
          - /opt/nginx/logs:/var/log/nginx:ro
        user: root

  handlers:
    - name: restart nginx_container
      docker_container:
        name: nginx
        state: started
        restart: yes
      ignore_errors: yes

    - name: restart node_exporter
      systemd:
        name: node_exporter
        state: restarted
        daemon_reload: yes

    - name: restart nginxlog_exporter
      systemd:
        name: prometheus-nginxlog-exporter
        state: restarted
        daemon_reload: yes

    - name: restart filebeat_container
      docker_container:
        name: filebeat
        state: started
        restart: yes